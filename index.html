<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked In</title>
    <link rel="stylesheet" href="styles.css?v=20260327004446">
</head>
<body>
    <div class="page-shell">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>
        <main class="app">
            <section class="lock-screen card" id="lock-screen">
                <p class="eyebrow" id="lock-badge"></p>
                <h1 id="lock-title"></h1>
                <p class="lead" id="lock-subtitle"></p>
                <form class="lock-form" id="lock-form">
                    <label for="passcode-input" id="passcode-label"></label>
                    <input
                        id="passcode-input"
                        name="passcode"
                        type="password"
                        inputmode="text"
                        autocomplete="off"
                        autocapitalize="off"
                        spellcheck="false"
                        required
                    >
                    <button id="open-button" type="submit">Open</button>
                </form>
                <div class="launch-status">
                    <p class="section-tag" id="launch-status-label"></p>
                    <p class="status-copy" id="launch-status-copy"></p>
                </div>
                <p class="hint" id="lock-hint"></p>
                <p class="error" id="lock-error" role="alert" aria-live="polite"></p>
            </section>

            <section class="dashboard hidden" id="dashboard">
                <header class="hero card reveal">
                    <div class="hero-copy">
                        <p class="eyebrow" id="hero-eyebrow"></p>
                        <h1 id="hero-title"></h1>
                        <p class="lead" id="hero-intro"></p>
                    </div>
                    <div class="hero-meta">
                        <div class="meta-chip">
                            <span id="trip-label"></span>
                            <strong id="return-date"></strong>
                        </div>
                        <button class="secondary-button" id="random-note-button" type="button">
                            Show me a note
                        </button>
                    </div>
                </header>

                <section class="grid">
                    <article class="card reveal daily-card">
                        <p class="section-tag">Daily Message</p>
                        <p class="daily-note-date" id="daily-note-date"></p>
                        <h2 id="daily-note-title"></h2>
                        <div class="daily-note-body" id="daily-note-body"></div>
                        <div class="daily-special">
                            <span id="daily-special-label"></span>
                            <strong id="daily-special"></strong>
                        </div>
                    </article>

                    <article class="card reveal">
                        <p class="section-tag">Keep This In Mind</p>
                        <h2>What stays true</h2>
                        <ul class="reassurance-list" id="reassurance-list"></ul>
                    </article>
                </section>

                <section class="card reveal">
                    <div class="section-head">
                        <p class="section-tag">Open When</p>
                        <h2>Pick what you need</h2>
                        <p>
                            Open the one that fits the moment. I left these here for whatever kind of day you are having.
                        </p>
                    </div>
                    <div class="open-when-grid" id="open-when-grid"></div>
                </section>

                <section class="card reveal tucked-note">
                    <p class="section-tag">Always True</p>
                    <blockquote id="footer-note"></blockquote>
                </section>
            </section>
        </main>
    </div>

    <div class="modal hidden" id="note-modal" aria-hidden="true" role="dialog" aria-modal="true">
        <div class="modal-panel">
            <button class="close-button" id="close-modal-button" type="button" aria-label="Close note">
                Close
            </button>
            <p class="section-tag" id="modal-trigger"></p>
            <h2 id="modal-title"></h2>
            <p class="modal-preview" id="modal-preview"></p>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="secure_payload.js?v=20260327004446"></script>
    <script src="app.js?v=20260327004446"></script>
</body>
</html>
